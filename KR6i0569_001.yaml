body:
  text: 唐罽賓國沙門佛陀多羅譯明匡山逸臾憨山釋德清解明新安程夢暘覺我較閱此經以單法為名一真法界如來藏心為體以圓照覺相為宗以離妄證真為用以一乘圓頓為教相以單法為名者論云所言法者謂眾生心圓覺二字直指一心以為法體此有多稱亦名大圓滿覺亦名妙覺明心亦名一真法界亦云如來藏清淨真心楞伽云寂滅一心即起信所言一法界大總相法門體稱謂雖多總是圓覺妙心唯此一心乃十法界凡聖迷悟依正因果之本為諸佛之本源號為法身為眾生之心地故名佛性一切諸法皆依此心建立故單以法為名其大方廣乃此心法所具體相用三大之義然大即體大謂此一心包法界而有餘擴太虗而無外橫該竪遍大而無外故名大也方即相大又方訓法也謂此一心為眾生之佛性以有此性軌則一聞佛性便能生解長劫輪迴持而不失故曰軌物生解任持自性以無相真心而為有相之法則故方為相大也廣即用大以稱此心體周遍無遺無剎不現無物不周故為用大也以此法義圓備一心以此經中直指此心為生佛迷悟脩證之本故云單法為名也脩多羅是梵語此云契經以凡是佛所說之經通名契經謂是契理契機之教但應機有大小為小乘人說者名不了義經為大乘人說者名了義經謂顯了究竟之極談以題中通指此經乃經藏中了義之經非不了義經也上十字乃一經所詮之法義下一經字乃別指當經能詮之文字也一真法界如來藏心為體者經云入於神通大光明藏即如來藏清淨心體平等不二故曰一真又云如法界性究竟圓滿是則名為因地法行首稱大陀羅尼門即一法界大總相法門體為諸佛之因地菩薩之行本故以此為一經之體也以圓照覺相為宗者經云一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道故以為一經之宗也離妄證真為用者經云知是空華即無輪轉又云知幻即離離幻即覺故以此為用也一乘圓頓為教相者以此經純談覺性圓脩三觀頓證一心雖列二十五輪但是一心轉換並無階級次第故以圓頓為教相也然此五重乃天台釋經之軌則攝盡全經之旨趣故學者開卷了此則恩過半矣唐罽賓國沙門佛陀多羅譯此翻譯名氏也罽賓乃西域之國號此云賤種以此國開土乃賤人自立為君長故相傳為名佛陀此云覺多羅此云救乃譯師之名也傳譯年代具載別傳匡山逸臾憨山釋德清直解初序分如是我聞一時此下至平等法會總名證信序以諸經之首皆有此序名為通序以阿難請問佛遺命立言證法有所授也如是我聞者謂阿難結集法藏時口宣佛言謂如是之法我阿難從佛所聞非臆說也一時之言本無定指但是佛與弟子機感會集之時故凡說經皆曰一時婆伽婆亦云薄伽梵乃梵音楚夏耳是佛之果號此號從來不翻以含多義故不翻謂此一語具有六義一自在二熾盛三端嚴四名稱五吉祥六尊貴皆稱佛德若翻一名則攝義不盡故但存梵語耳此五不翻之一例也此為說法主入於神通大光明藏三昧正受一切如來光嚴住持此說經處也佛有三身謂法報化所依土亦有三謂寂光實報莊嚴及方便有餘法身佛依寂光土報身佛依實報土即盧舍那佛住華藏土與地上菩薩說華嚴經化身乃釋迦佛依人間靈山舍衛精舍等處為人天等說三乘法今說經處言大神通光明藏者乃常寂光土是法身所依言三昧此云正定正受者乃正定中受用意顯此經乃法報同體之佛所說正定正受乃自受法樂之處也一切如來光嚴住持者言法性土乃諸佛所證常寂光土以光為嚴非餘寶物莊嚴也以此寂光乃法身之安宅故云住持即此說處依真便非他佛餘處可比顯法最殊勝也是諸眾生清淨覺地此言寂光乃生佛平等之實際謂諸佛之安宅即是眾生本有不迷之覺地此顯真妄不二之真境也身心寂滅平等本際圓滿十方不二隨順此言寂光真境乃諸佛眾生若身若心皆同寂滅平等之實際此體深也圓滿十方謂用廣言其用圓滿含褁十方廣大無外也不二隨順文倒應云隨順不二謂一切聖凡皆歸此中平等一際故云隨順不二於不二境現諸淨土上不二境乃諸佛自受法樂之地也以無身心之相何有主伴之分若無主伴無說無示則無說法之事矣今言從不二境現諸淨土者正顯從自受用現他受用土乃為地上菩薩說自性法之報土此中乃有說聽然此土中雖有說聽而如來尚在三昧未曾出定何以有說意顯此經乃法身如來所說之法顯示離心意意識境界相此正如來最勝清淨禪殊非他經可比也楞伽經中法身說法乃以法證佛此經以處證佛二經合觀良有深旨此從來所未達者請深觀之與大菩薩摩訶薩十萬人俱其名曰文殊師利菩薩普賢菩薩普眼菩薩金剛藏菩薩彌勒菩薩清淨慧菩薩威德自在菩薩辨音菩薩淨諸業障菩薩普覺菩薩圓覺菩薩賢善首菩薩等而為上首與諸眷屬皆入三昧同住如來平等法會此標伴眾列上首之名也十二大士舊解皆以三觀釋其名然各具其德似不必拘言皆入三昧者以佛乃即法身之報相土乃即寂光之報土況佛自入三昧說自性法豈有聽眾散心而可入耶故必入三昧然後可同住此平等法會也問曰主伴皆在三昧則無聽矣將何以顯法耶答曰此不思議之妙法也昔空生巖中宴坐天帝散華讚為善說般若空生曰我實無說天帝曰尊者以不說說我以絕聽聽如此說聽是真般若了此可信三昧中善說善聽也舊說菩薩既有啟請威儀必有出入之文或譯人略之此說太拘豈不聞那伽常在定無有不定時豈獨佛常在定而菩薩便不定耶八地菩薩現三昧樂意生身而度生豈出定耶若執必出定而有聽受啟請則不起滅定而現諸威儀豈非菩薩之事耶因便及此學者識之於是文殊師利菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言此經家敘置問法之威儀也大悲世尊願為此會諸來法眾說於如來本起清淨因地法行及諸菩薩於大乘中發清淨心遠離諸病能使未來末世眾生求大乘者不墮邪見此正陳請辭也問有二意一問如來因地發心依何等法脩何等行而得成佛二問現在菩薩於大乘中已發清淨願成佛度生之心但不知如何用心脩行得正知見不墮偏邪之病若蒙開示則使未來末世眾生有發大乘心者即依今日所說而脩則不墮於邪見矣此雖為現在而問其實多為未來之機此悲願之心也作是語已五體投地如是三請終而復始此敘置求法之懇誠也爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩諮詢如來因地法行及為末世一切眾生求大乘者得正住持不墮邪見汝今諦聽當為汝說此讚善問誡聽許說也下倣此時文殊師利菩薩奉教歡喜及諸大眾默然而聽此欣承法音冥心佇聽也下倣此以敘十二大士請法之儀一一皆同其文最整故不重釋善男子無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道此直示本起因地也如來因地獨標圓覺一法而為行本然稱此圓覺為陀羅尼門者梵語陀羅尼此云總持謂總一切法持無量義以此圓覺為十法界大總相法門體一切聖凡依正迷悟因果皆依此圓覺一心而為建立以無一法而不具故曰總因果纖毫不失不壞故曰持一切聖凡無不由之故稱為門流出者即由此建立之義然此覺體為諸佛之法身為眾生本覺之心地雖染而不染故曰清淨從來不妄不變故稱真如但以無明障蔽而不現諸佛如來於因地依此本覺真心發始覺之智斷盡無明始本合一名究竟覺為得菩提之果還歸寂滅一心名為圓寂是稱涅槃是知諸佛果德皆依此圓覺一心建立故云流出然不獨佛果即菩薩因地諸波羅蜜亦從此出故云及也以諸佛之因地為菩薩之行本故云教授是故一切如來成佛本起之因地更無別法皆依此圓覺自性之光明還照寂滅清淨之覺體相即性體也以此圓滿照徹無遺則無明永斷圓證法身唯此一法而已故曰皆依圓照清淨覺相永斷無明方成佛道也然圓照即一心三觀之智清淨覺相即一心三諦之體全經但發明此一句而已問曰此云有大陀羅尼門名為圓覺流出一切云云等與首楞嚴云有三摩提名大佛頂首楞嚴王等語勢似同義有何別答曰語雖似同義有小別以此經直指覺體為因地心彼經以首楞嚴大定為成佛初心之方便此體彼用為不同耳然所同者彼經先以不生滅心為本脩因依之建立首楞嚴大定然不生滅心即此覺體彼首嚴定即此圓照清淨覺相以此圓照即彼大定此中覺相即彼不生滅心攝用歸體究竟無二故皆為成佛之本問曰佛言圓覺陀羅尼門為如來本起之因地又曰清淨真如則為眾生不迷之佛性又曰皆依圓照清淨覺相則本無無明可斷也忽曰永斷無明方成佛道則義不相蒙敢問其旨答曰此義幽深非麤心可擬請試言之然圓覺妙心乃諸佛眾生平等無二之法身也以法身流轉五道名曰眾生然清淨真如乃諸佛之法身眾生之佛性良由最初一念無明不覺迷此法身而成五蘊幻妄之身心則本有圓覺而為不迷之佛性以煩惱不能染故曰清淨本來不妄不變故曰真如故清淨真如一語直指眾生迷中之佛性也以諸佛因地同是眾生但能依本覺之佛性發起始覺之智斷盡無明始本合一名得菩提還證寂滅一心故曰涅槃是則諸佛菩提涅槃之果德皆從迷返悟脩而後得故曰永斷無明方成佛道然脩斷之方皆依圓覺自性之智光還照寂滅清淨之心體故曰圓照清淨覺相以自性光明一照則無明頓破故曰永斷此實成佛之祕訣頓悟頓證之妙門為如來因地之法行此經直指一心圓頓之旨故首揭於此為一經之宗趣語義幽深非淺識可了故特發之云何無明此徵釋無明之體將顯圓照之功也此徵下釋善男子一切眾生從無始來種種顛倒猶如迷人四方易處妄認四大為自身相六塵緣影為自心相譬彼病目見空中華及第二月此釋無明之元也謂眾生本有法身元無生死今因最初一念不覺之無明迷本來之佛性起貪嗔痴造種種業妄取六趣之生死故云種種顛倒雖在往來生死之中而法身湛然不動故如人迷方而方實不轉也所以迷者以背法身但認四大假合之幻身為己身妄認攀緣六塵影子妄想緣慮之心為真心譬如病目見空中華及第二月病目喻無明空華喻妄身二月喻妄心認妄失真故云顛倒善男子空實無華病者妄執由妄執故非唯惑此虗空自性亦復迷彼實華生處由此妄有輪轉生死故名無明此喻示無明之體也謂法身本無身心之相如空本無華今妄認四大為身如執空華為實有由妄執故不唯迷本法身故云惑此虗空自性亦復不知妄身從無明有故云迷彼實華生處由此顛倒故有輪轉生死此乃無明之體也善男子此無明者非實有體如夢中人夢時非無及至於醒了無所得如眾空華滅於虗空不可說言有定滅處何以故無生處故一切眾生於無生中妄見生滅是故說名輪轉生死此釋無明體空以明生死本來不有也以生死乃迷中之顛倒如夢中事覺後即空以生本無生故滅亦無滅故如空華無定滅處善男子如來因地脩圓覺者知是空華即無輪轉亦無身心受彼生死非作故無本性無故此的示頓悟妙門以顯圓照之功唯一知字也謂諸佛因地脩行唯以圓覺自性光明圓照自心寂滅之體一念了知身心世界如空中華本來不有則生死當下頓斷以身心本空故無可受生死者此非造作而後無特以本來自性元無故也彼知覺者猶如虗空知虗空者即空華相亦不可說無知覺性有無俱遣是則名為淨覺隨順此拂能所對待之跡以顯圓照平等寂滅究竟一心淨覺之智也云彼知覺者乃指上知是空華之知即所謂圓照乃自性本有之智光為能照之智者字指所照之境即清淨之覺相如虗空乃喻所照之覺體所謂清淨法身猶若虗空謂此覺體雖是本有向被無明障蔽從來不覺今仗智光一照則無明頓破本體當下現前則歷劫生死一時頓斷是所謂知是空華即無輪轉此特顯智照有功也知虗空者此者字乃指上能照之智意謂初以智照惑惑滅則智亦不存然所照既寂若存能照之知猶是無明故須遣之故云知虗空者即空華相此則能所雙忘寂照不二到此唯有如智照體獨立故云亦不可說無知覺性直至心境兩忘能所俱泯故云有無俱遣如此乃合寂滅一心故云是則名為淨覺隨順此文倒應云隨順淨覺即前云隨順不二也何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿遍十方故是則名為因地法行此徵釋所照寂滅心體重顯絕待真心以示清淨覺相也何故要重重遣拂能所耶以寂滅心體本來如虗空性常住不動此顯空也謂今雖有身心生死本來如空中華以如來藏中無起滅故不容有知見故此顯假也如者稱也謂稱法界性究竟圓滿周遍十方故此顯中也此實妙覺明心之實際如來因地唯此而已菩薩因此於大乘中發清淨心末世眾生依此脩行不墮邪見菩薩發心當因此而發則為真因眾生依此而脩則為正行故不墮邪見此結問答意也爾時世尊欲重宣此義而說偈言文殊汝當知一切諸如來從於本因地皆以智慧覺了達於無明知彼如空華即能免流轉又如夢中人醒時不可得覺者如虗空平等不動轉覺徧十方界即得成佛道眾幻滅無處成道亦無得本性圓滿故菩薩於此中能發菩提心末世諸眾生脩此免邪見偈頌對之則有無廣略可知於是普賢菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言請法威儀大悲世尊願為此會諸菩薩眾及為末世一切眾生脩大乘者聞此圓覺清淨境界云何脩行世尊若彼眾生知如幻者身心亦幻云何以幻還脩於幻若諸幻性一切盡滅則無有心誰為脩行云何復說脩行如幻若諸眾生本不脩行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫願為末世一切眾生作何方便漸次脩習令諸眾生永離諸幻此普賢大士聞前開示躡跡起疑故特啟請脩行方便也由前佛說知是空華即無輪轉亦無身心受彼生死此乃一念頓悟當下頓了生死則不假脩行更無方便此則太有徑庭非上上根人不能領悟奈何末世眾生上上根者少若不假脩行必難悟入若不假方便不能造脩故此首問脩行以求方便漸次之法也若謂知是空華即無輪轉然空華即幻妄也若縱有眾生能知身心如幻者若所知是幻則此能知之身心亦是幻矣云何以幻還脩於幻耶此一疑也若所知之幻既滅則能知之幻亦滅矣如此能所皆滅則無有心矣又誰為脩行之人耶云何復說脩行如幻此二疑也若諸眾生本不假脩行如此則於生死中常居幻化曾不了知如幻境界是則令妄想心云何解脫耶此三疑也因此請問如來願說脩行之方便當令眾生永離諸幻也故向下世尊答以眾生幻心還依幻滅不妨以幻脩幻為一答諸幻滅盡覺心不動不入斷滅為二答知幻即離亦無方便離幻即覺亦無漸次為三答然通釋成前章頓悟頓脩之意作是語已五體投地如是三請終而復始此敘求法之懇誠也爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生脩習菩薩如幻三昧方便漸次令諸眾生得離諸幻汝今諦聽當為汝說此讚善問誡聽許說也時普賢菩薩奉教歡喜及諸大眾默然而聽此欣承法音冥心佇聽也善男子一切眾生種種幻化皆生如來圓覺妙心猶如空華從空而有幻華雖滅空性不壞眾生幻心還依幻滅諸幻盡滅覺心不動此答諸幻滅盡不入斷滅依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是是故幻滅名為不動此答以幻脩幻以釋成不入斷滅之意也謂以覺覺幻覺亦是幻故云依幻說覺亦名為幻若說幻滅而覺存者此亦是幻故云若說有覺猶未離幻若更起一見說幻滅而覺亦無者亦復是幻何也以未達究竟實際故也直須有無俱遣照體獨立故云幻滅名為不動以種種幻化皆生圓覺妙心故諸幻滅盡覺心不動也善男子一切菩薩及末世眾生應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離此示離幻方便以答永離諸幻之請以遣離幻之心也謂知是幻方起能離之心諸幻既滅若堅執有能離之心此心亦如幻者故應亦復遠離此遣第一重能離之心也遠離為幻亦復遠離此遣第二重離心之離也謂初以知離幻幻滅則遣能知之心若能知已泯則此離亦如幻故云遠離為幻亦復遠離離遠離幻亦復遠離此遣第三重離上遠離之離所謂遣遣也得無所離即除諸幻譬如鑽火兩木相因火出木盡灰飛烟滅以幻脩幻亦復如是諸幻滅盡不入斷滅此言遣之又遣以至無遣故云得無所離即除諸幻也鑽火喻諸幻智灰飛烟滅以喻遣遣唯有地存故喻不入斷滅此總結答問意也善男子知幻即離不作方便離幻即覺亦無漸次此結示頓悟頓證以顯究竟一心之旨也問曰上答以幻脩幻遣之又遣皆是方便漸次之意今結示云不作方便亦無漸次豈佛自語相違耶答曰此義幽玄誠難體會上云種種幻化皆生如來圓覺妙心雖云重重遣拂所遣拂者總是一幻謂此妙覺心中凡有起心動念絲毫見處未忘通皆是幻若知到底是幻則一切諸幻自離但知而已又何別作方便若但存執著之心即是知見未忘便名微細法執了達一切皆幻則當下消亡全體自現故云知幻即離離幻即覺正如香象渡河一踏到底所謂不作方便亦無漸次也一切菩薩及末世眾生依此脩行如是乃能永離諸幻此結酬問意也謂必要如是重重遣拂乃能永離諸幻也爾時世尊欲重宣此義而說偈言普賢汝當知一切諸眾生無始幻無明皆從諸如來圓覺心建立猶如虗空華依空而有相空華若復滅虗空本不動幻從諸覺生幻滅覺圓滿覺心不動故若彼諸菩薩及末世眾生常應遠離幻諸幻悉皆離如木中生火木盡火還滅覺則無漸次方便亦如是長行但云種種幻化生於覺心不知何者是幻化故頌中補無明二字謂種種幻化皆無明也於是普眼菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言請法威儀大悲世尊願為此會諸菩薩眾及為末世一切眾生演說菩薩脩行漸次云何思惟云何住持眾生未悟作何方便普令開悟此普眼請開漸次之行以釋圓照清淨覺相之義也由前文殊章直云知是空華即無輪轉亦無身心受彼生死普賢章云知幻即離不作方便離幻即覺亦無漸次此乃頓悟一心當下頓證不涉途程不假脩行但一知字而已此是上上根人方能了悟奈末世眾生上上根少中下者多若不脩行則長在生死若脩行無正方便則無門可入若無漸次亦難頓悟故問思惟乃初心止觀下手工夫住持乃安心之法則總是開悟之方便也世尊若彼眾生無正方便及正思惟聞佛如來說此三昧心生迷悶即於圓覺不能悟入願興慈悲為我等輩及末世眾生假說方便此重請必要方便思惟者以初心必假正方便入門然後乃可得正思惟且以方便為急故結請方便也假說者於無方便中設方便故為假說耳按後答文初依奢摩他持戒宴坐乃正方便恒作是念止觀雙運乃正思惟非幻不滅乃安住垢相永滅十方清淨乃開悟也作是語已五體投地如是三請終而復始三展䖍誠爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來脩行漸次思惟住持乃至假說種種方便汝今諦聽當為汝說讚許誡聽時普眼菩薩奉教歡喜及諸大眾默然而聽當機默佇善男子彼新學菩薩及末世眾生欲求如來淨圓覺心應當正念遠離諸幻此總答問意也普眼雖問脩行漸次思惟住持等然主意單問離幻初心方便故佛答以脩行捷要只是以正念為最初下手工夫故云應當正念然正念者無念也故凡起心動念在圓覺體中皆為幻化意在一念不生則諸妄自滅故云遠離諸幻以前云種種幻化皆生如來圓覺妙心故須離念乃得相應論云離念境界唯證相應故此以為最初方便也先依如來奢摩他行堅持禁戒安處徒眾宴坐靜室此示離念之方便也梵語奢摩他此云止也然脩行必以止為首者以眾生向認妄想攀緣之心念念生滅無暫停時今欲一但離念豈可得耶故先脩止行以為最初工夫為入禪之方便也所言止者按天台止有三止謂體真止方便隨緣止息二邊分別止以此三止為前導然後可入空假中之三觀今經之止但是體真止也若脩此止先將身心內外一齊放下放下又放下放到無可放處則諸想歇滅內外一空即此空處便能體合真心妄想不生則念自離也故以止為正念若正念現前則諸妄頓滅故云遠離諸幻此為入禪之切要學者應知堅持禁戒者此正楞嚴三漸次先持四重皎如氷霜故曰堅持宴坐靜室者以行人向在動亂境中非宴坐不能攝心以此證之既不動作則單脩體真止耳然必安處徒眾者非要多人但取同見同行為依止決擇使行易成耳恒作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處即知此身畢竟無體和合為相實同幻化四緣假合妄有六根此示入觀之方以答漸次思惟之問先示假觀也今普眼漸次方便思惟之問蓋因文殊章云妄認四大為自身相六塵緣影為自心相且云知是空華即無輪轉又云知幻即離不作方便是乃頓悟頓證第恐中下根人不能頓入故有此請世尊先示脩止為前方便今示入觀正答思惟之問先示假觀之方初教觀身次第分析然後觀心此示漸次之方也然觀亦有三謂空假中今依楞嚴如幻三摩提乃示先從假入空次從空假入中正顯脩心之漸次此先觀身如幻故為假觀三觀圓具一心總釋前知幻即離一知字六根四大中外合成妄有緣氣於中積聚似有緣相假名為心此示觀心之方便也六根為內四大為外即所造六塵以根塵和合識生其中故云合成妄有下示心假也謂現前之心乃妄想耳非真心也何以知之以是六識攀緣前五塵落謝影子以緣氣聚積似有假相乃是妄想影子假名為心以眾生日用但認此假影為心耳今觀此心離塵無體苟不認假為真則妄想自消即妄想消處不求真而真自復故為假觀之方便也善男子此虗妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見此示假觀之成功也前云妄認六塵緣影為自心相若但知幻即離不能頓離故教先觀此身四大是假各歸散滅內根既無則外亦無塵可對根塵既消則緣心亦滅此心亦假也善男子彼之眾生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅譬如磨鏡垢盡明現此示從假入空觀也謂以觀照根塵識三俱已消滅然所觀既空則能觀亦泯故云幻滅亦滅以前云知虗空者即空華相故觀照亦不立此則能所兩忘對待斯絕唯一圓明清淨真心故云非幻不滅覺心不動清淨乃空之異名故云空觀鏡喻可知善男子當知身心皆為幻垢垢相永滅十方清淨此從空假以入中道也初云皆依圓照清淨覺相但是一心故名中道善男子譬如清淨摩尼寶珠映於五色隨方各現諸愚痴者見彼摩尼實有五色善男子圓覺淨性現於身心隨類各應彼愚癡者說淨圓覺實有如是身心自相亦復如是由此不能遠於幻化是故我說身心幻垢對離幻垢說名菩薩垢盡對除即無對垢及說名者此顯絕待真心以示圓照清淨覺相之體也摩尼珠喻圓照淨心隨現五色喻五蘊身心舊註云喻五道此指太寬以經云身心自相乃的指五蘊而隨類之言意該五道然正義的指五道眾生總一五蘊身心耳謂妙圓覺心本無五蘊良由無明業幻所作全從妙心所現故如摩尼隨現五色眾生不了真心但認五蘊幻相故如痴人執珠體實有五色也以錯認五蘊為我以覆蔽真體故為幻垢今以觀智照破五蘊皆空故名菩薩以對待未忘猶是無明故真體未顯若對待一忘能所雙絕乃顯絕待真心耳善男子此菩薩及末世眾生證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發覺圓明故顯心清淨此正顯圓照之相也謂此妙圓心體本自靈明廓徹廣大虗寂名為真空初因一念無明障蔽妙明遂變真空之體而為十方頑空今無明既破則十方虗空悉皆消殞故觀十方虗空從覺心顯發然虗空既消則妙明體露故云顯心清淨此心一淨則十法界無不清淨矣故下文歷明聖凡身心境界一一皆清淨即前云清淨覺相然清淨乃空之異名從此已下至平等不動總示空觀義也心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨識清淨故聞塵清淨聞清淨故耳根清淨根清淨故耳識清淨識清淨故覺塵清淨如是乃至鼻舌身意亦復如是此顯妙覺心體圓照之相以示空體也此見塵特指無明妄見乃八識之見分圓映六門此見即是塵非色塵也謂十法界迷悟心境皆依妄見而有今無明一破妙覺圓明心境雙亡能所斯絕此見亦泯故十法界蕩然清淨由清淨故則一一周遍唯一妙明圓照法界故下文一一歷言六凡四聖心境一一清淨周遍也據理即一心圓照聖凡影絕但問示未悟故下文次第一一歷言以顯圓明周遍之妙耳且先示六凡清淨善男子根清淨故色塵清淨色清淨故聲塵清淨香味觸法亦復如是此正言六塵清淨也以此言六塵故知前見塵非是六塵蓋指妄見即是塵耳善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是此言四大清淨也善男子四大清淨故十二處十八界二十五有清淨此言通示六凡心境一切清淨也根塵識界乃凡夫根境二十五有乃三界為眾生依報之地總而言之則身心世界一切悉皆清淨此正與法華所言六根清淨義同彼經但言持經法師乃觀行位人即得六根清淨此言頓悟唯心則凡聖俱泯故歷出世四聖一切清淨耳上言六凡下言四聖彼清淨故十力四無所畏四無礙智佛十八不共法三十七助道品清淨如是乃至八萬四千陀羅尼門一切清淨此歷言出世四聖境界悉皆清淨也善男子一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方眾生圓覺清淨將顯根身世界圓滿清淨此先舉正報一身以及多身凡是眾生無不清淨然十方眾生圓覺清淨則眾生如也善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓褁三世一切平等清淨不動此例觀依報世界清淨如是則眾生界空聖凡齊泯唯一清淨圓明寶覺矣楞嚴云我以不生不滅合如來藏而如來藏非世間法非出世間法而一切法皆如來藏矣故下一一皆云不動善男子虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動以虗空世界眾生因迷覺性而有今一切法合乎圓覺則平等平等寂滅無二故云不動此但顯泯一切法當空觀義也由攝事歸理理徧則事亦徧故下文云一一周徧善男子覺性遍滿清淨不動圓無際故當知六根遍滿法界根遍滿故當知六塵遍滿法界塵遍滿故當知四大遍滿法界如是乃至陀羅尼門遍滿法界此歷十法界以顯事隨理徧當法界理事無礙門示假觀義也善男子由彼妙覺性遍滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜如百千燈光照一室其光遍滿無壞無雜此歷十法界以顯事事無礙法界周遍含容觀當一心中道義也此明法界一心相在無雜各不壞相故成圓覺普照義也善男子覺成就故當知菩薩不與法縛不求法脫不厭生死不愛涅槃不敬持戒不憎毀戒不重久習不輕初學何以故一切覺故譬如眼光曉了前境其光圓滿得無憎愛何以故光體無二無憎愛故此示寂滅一心平等不二正顯清淨覺相也以縛脫憎愛等皆二相也由無明妄見故有二相今以圓照則一切皆覺故無二也眼光乃八識現量圓照諸根在眼最顯故取喻圓覺普照無二之體善男子此菩薩及末世眾生脩習此心得成就者於此無脩亦無成就圓覺普照寂滅無二於中百千萬億阿僧祇不可說恒河沙諸佛世界猶如空華亂起亂滅不即不離無縛無脫始知眾生本來成佛生死涅槃猶如昨夢此重釋上圓覺普照寂滅無二之相以顯究竟一心之極證也以如來藏中本無迷悟生死去來之相然生死涅槃皆無明夢中之事今無明夢破迴視往事如昨夢耳善男子如昨夢故當知生死及與涅槃無起無滅無來無去其所證者無得無失無取無捨其能證者無作無止無任無滅於此證中無能無所畢竟無證亦無證者一切法性平等不壞此重示寂滅一心究竟無二之體也前云圓覺性中流出一切清淨真如菩提涅槃諸波羅蜜謂迷清淨真如而為五蘊之眾生生死法也菩提涅槃乃所證之果諸波羅蜜為能證之行以如來藏中本無去來迷悟生死故生死涅槃皆如昨夢既如昨夢則豈有脩證得失取捨之事耶既無脩證則無能所一切影像畢竟寂滅如此法法皆真常住不壞此圓照法界清淨覺相之極則通釋首章皆以圓照清淨覺相之義也善男子彼諸菩薩如是脩行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶此結酬請辭指歸正行故皆云如是爾時世尊欲重宣此義而說偈言普眼汝當知一切諸眾生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者如是漸修行一切悉清淨不動遍法界無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無來去初發心菩薩及末世眾生欲求入佛道應如是脩習頌義如文可知於是金剛藏菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言請法威儀大悲世尊善為一切諸菩薩眾宣揚如來圓覺清淨大陀羅尼因地法行漸次方便與諸眾生開發蒙昧在會法眾承佛慈誨幻瞖朗然慧目清淨讚謝也因前佛云猶如瞖目見空中華以上開示根身世界一切清淨如空華影落故此謝云幻瞖朗然慧目清淨也世尊若諸眾生本來成佛何故復有一切無明若諸無明眾生本有何因緣故如來復說本來成佛十方異生本成佛道後起無明一切如來何時復生一切煩惱惟願不捨無遮大慈為諸菩薩開祕密藏及為末世一切眾生得聞如是脩多羅教了義法門永斷疑悔此金剛藏啟請因聞佛說眾生本來成佛一語頓起三疑故興此問意謂佛初說眾生因無始無明妄認身心故有生死且云永斷無明方成佛道此則無明乃眾生本有也云何復說眾生本來成佛若眾生本來成佛何故復有無明耶若眾生本來成佛後起無明則一切如來是已成之佛何時復生一切煩惱耶因聞眾生本來成佛與永斷無明方成佛道之語相違故展轉三疑以致此問作是語已五體投地如是三請終而復始三展䖍誠爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來甚深祕密究竟方便是諸菩薩最上教誨了義大乘能使十方脩學菩薩及諸末世一切眾生得決定信永斷疑悔汝今諦聽當為汝說讚許誡聽時金剛藏菩薩奉教歡喜及諸大眾默然而聽當機默佇善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪迴未出輪迴而辯圓覺彼圓覺性即同流轉若免輪迴無有是處此意責問者不應以生滅心妄辯圓覺之體也以十法界迷悟因果皆生死邊事從妄見有圓覺性中本無此事若以妄見而辯圓覺則此覺性亦同生死法矣世界有三種謂眾生正報世間依報世間諸佛為智正覺世間此總該十法界依正因果也始謂迷本之因終謂涅槃之果生滅乃眾生之身心該住異之四相前後乃三際前後乃過未以該現在有無聚散乃世界成住壞空有無乃住空聚散乃成壞起謂三界生死止謂二乘涅槃如上之事乃妄見妄想念念相續從來生滅不停循環往復種種取捨如此皆是輪迴生死之妄見也若以此妄見而辯圓覺而圓覺性亦同生死之法矣故云即同流轉若以妄見而免生死無有是處此總責顛倒下以喻詳示譬如動目能搖湛水又如定眼由迴轉火雲駛月運舟行岸移亦復如是此以四法喻妄見也湛水無波因動目而有波定眼無輪由旋火而有輪月岸不移因雲舟而運動湛水定眼月岸通喻覺性水波火輪雲駛舟行通喻妄見善男子諸旋未息彼物先住尚不可得此先合喻諸旋乃水波火輪雲駛舟行彼物指湛水定眼月岸謂旋若未息而彼諸物必難先住也何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復是故汝等便生三惑此以淺況深通責迷倒也意謂世間淺近之事若旋不止而彼物必難先住何況以生死妄見而辨淨妙常住之覺性豈不墮彼流轉耶此三惑之興實由妄見分別耳此總責三疑下正答問義善男子譬如幻翳妄見空華幻翳若除不可說言此翳已滅何時更起一切諸翳何以故翳華二法非相待故亦如空華滅於空時不可說言虗空何時更起空華何以故空本無華非起滅故生死涅槃同於起滅妙覺圓照離於華翳此以空華一喻總答所問以決三疑也幻翳喻無明妄見空華喻生死涅槃虗空喻妙覺真心此通顯生死涅槃皆即狂勞顛倒華相妙圓心中本無此事今剛藏之疑因聞首章佛說無明乃眾生妄認幻妄身心為本有者此則眾生的因無明而有也如此何以又說眾生本來成佛若眾生本來是佛後作眾生則是無明從佛心中而有矣如此則諸佛心中何時更起煩惱而作眾生耶此展轉三疑皆從妄見分別而有特未悟妙圓真心耳故先總責輪迴顛倒之見而以幻翳空華之喻以總答之也若悟空本無華何疑眾生本來成佛若了華從翳生又何疑成佛後起煩惱此如來善巧開示了此一喻則三疑頓釋矣善男子當知虗空非是暫有亦非暫無況復如來圓覺隨順而為虗空平等本性善男子如銷金鑛金非銷有既已成金不重為鑛經無窮時金性不壞不應說言本非成就如來圓覺亦復如是此特示妙圓常住真心不屬生死涅槃以重釋佛起煩惱之疑也意謂虗空尚不隨於幻華起滅何況妙覺明心而為虗空本性又豈隨於生死涅槃起滅耶苟悟覺性平等常住不動諸佛證此豈復生迷故以銷金之喻以結示之若了此喻則眾生雖本是佛現在無明不妨脩而後成如金雖本有現在鑛中終以銷而後見所謂佛本是而勤脩惑元無而須斷若知金性不壞又何疑佛更生迷此喻約而義妙故剛藏之疑不俟一一而氷釋矣下的示了義善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪迴及非輪迴此的示圓覺性中本無生死涅槃之相以決剛藏之疑也若悟此性自無起滅顛倒之見矣善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃何況能以有思惟心測度如來圓覺境界如取螢火燒須彌山終不能著以輪迴心生輪迴見入於如來大寂滅海終不能至是故我說一切菩薩及末世眾生先斷無始輪迴根本此示圓覺妙性非心思可及也且二乘身心已滅尚不能至自證涅槃何況眾生以生滅心欲入妙圓不生滅性決不能矣故喻如螢火燒須彌山終不能也二乘身心語言皆滅者以斷六識分別之心七識已伏不行故無覺觀語言但所證涅槃乃第八識全體無明認為涅槃以二乘人無明名字不知故不能至親證所現涅槃意謂二乘心行已滅尚不能知自證無明境界何況以生滅心欲入如來妙圓覺心此必不能也故以螢火喻之乃結示當斷輪迴根本正指無明妄見也善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處善男子虗妄浮心多諸巧見不能成就圓覺方便如是分別非為正問此直示妄元結責當機也意謂但凡夫起心動念皆是妄想非真心也以此妄想思惟辨於佛境遠之遠矣故如邀空華復結空果所以展轉但增妄想耳如是虗妄浮心豈能成就圓覺方便耶故非正問也爾時世尊欲重宣此義而說偈言金剛藏當知如來寂滅性未曾有終始若以輪迴心思惟即旋復但至輪迴際不能入佛海譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛生死與涅槃凡夫及諸佛同為空華相思惟猶幻化何況詰虗妄若能了此心然後求圓覺於是彌勒菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言請法威儀大悲世尊廣為菩薩開祕密藏令諸大眾深悟輪迴分別邪正能施末世一切眾生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見讚謝下正陳請辭世尊若諸菩薩及末世眾生欲遊如來大寂滅海云何當斷輪迴根本於諸輪迴有幾種性脩佛菩提幾等差別迴入塵勞當設幾種教化方便度諸眾生惟願不捨救世大悲令諸脩行一切菩薩及末世眾生慧目肅清照曜心鏡圓悟如來無上知見此正陳問義有四由上佛說菩薩脩行先斷輪迴根本故此首問云何當斷者意謂何等是輪迴根本也故佛下答以恩愛貪欲是輪迴根本二問輪迴有幾種性佛答以因二種障有五性差別三問脩行有幾種性佛答即以五性而顯差別四問菩薩度生有幾方便佛答唯以大悲同事願力然所問正為脩行乃及利生者以菩薩脩行本為度生而脩行亦不捨眾生界以度生即脩行也作是語已五體投地如是三請終而復始當機默佇爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧祕密微妙之義令諸菩薩潔清慧目及令一切末世眾生永斷輪迴心悟實相具無生忍汝今諦聽當為汝說讚許時彌勒菩薩奉教歡喜及諸大眾默然而聽佇聽善男子一切眾生從無始際由有種種恩愛貪欲故有輪迴若諸世界一切種性卵生胎生濕生化生皆因婬欲而正性命當知輪迴愛為根本此直答輪迴根本也無明有二一發業無明二潤生無明發業者乃無始最初一念妄動迷本圓明故號無明惟此但迷本有之法身妄認五蘊幻妄身心為我者乃前文殊章中所說無始本起無明也此雖迷真認妄尚未續諸生死但能發業而已二潤生無明正是生死相續輪迴之報本也由前迷理無明妄認五蘊身心為我即於此幻身復起男女好醜憎愛之見而貪愛婬欲之想因愛見而發所謂汝愛我心我憐汝色以是因緣百千萬劫長在纏縛故眾生迷法身慧命之真性但以婬欲一事而為受生稟命之正矣故曰皆因婬欲而正性命當知輪迴愛為根本故今脩行欲超生死得免輪迴當以斷婬為第一義也此正與楞嚴所說世出世間生與無生盡在婬心斷與不斷故今經的指先斷婬欲為脩行之要由有諸欲助發愛性是故能令生死相續此正示愛欲為生死根本也以眾生五蘊身心元因愛欲而有但以愛欲為性命之正故貪欲之境雖多即種種諸欲皆是助發愛性之本又不止酒肉五辛為助因也以愛根既深而助發愛性者日厚心心著欲念念潤生是故能令生死相續也下示輪迴之本欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果此申明愛欲為生死根本也欲因愛生者上云由有諸欲助發愛性蓋言諸欲亦從愛而生也以愛為根本欲為助因故然欲者貪也愛者淫根也以眾生婬心所愛者男女之美色因愛其色故貪種種飲食厚味以養之鉛華錦繡以飾之薦褥溫軟以適之乃至聲色以悅之一切諸欲皆從婬心而發也故曰欲因愛生也命因欲有者以眾生一生所欲染者男女之色也及死後捨命未受後報尚有中陰身此身別無所見但求欲境故千萬里遙見男女交媾之處若曾有宿染愛緣者即速疾至前則以男女之想為己有渴愛心極則乘愛涎流入母腹守此精血納想不捨遂結為胎此受命之元故曰命因欲有也故資其生者乃愛欲為因及受後報之身乃以愛命為果此其所以生死相續而不休也楞嚴眾生相續發明此義下示輪迴之狀由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼此明三途惡報苦果皆因婬欲而有也以愛心熾盛奔趣欲境然境有違順若境順其心則愛益滋甚若境違心便生憎嫉乃至嗔怒打罵甚至殺害則無惡而不造所以復招三途地獄之劇苦皆因愛而致也捨惡樂善復現人天此明由愛而感人天之果也上言造種種業總之不出十惡業謂身三殺盜婬口四妄言綺語兩舌惡口意三貪嗔痴此十惡業皆由愛欲而發若備造則感三途之報若平平不造則感生人道若增脩善品則感生天上蓋人天由愛厭業道亦從愛而致也又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果皆輪迴故不成聖道上言人天且指六欲天報言六天全未斷欲但不作惡故為十善所感此明色界已上諸天愛染不生精脩梵行然所脩者但知愛欲是染是麤障故深厭離故云棄愛樂捨且欣上是淨是妙是離故欣樂取證然欣亦愛也故云還滋愛本由此但名有為增上善果未超生死故云皆是輪迴不成聖道良由以愛捨愛故生死不斷所謂饒君脩到非非想也落禪家第二籌以生死情根未斷故也是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴此總結輪迴根本皆貪欲渴愛之過患也善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟此釋疑顯權也恐有疑云菩薩入諸生死豈非貪欲之過耶故此釋云菩薩但示貪欲而入生死以同事攝令彼捨貪乃是權現非實事也然脩行者必斷貪欲於清淨心方得開悟耳上答輪迴根本下答種性善男子一切眾生由本貪欲發揮無明顯出五性差別不等依二種障而現深淺云何二障一者理障礙正知見二者事障續諸生死此下答輪迴問有幾種性也謂理事二障為輪迴性性體也以理障乃發業無明事障乃潤生無明輪迴生死以二障為體即脩行差別亦因無明厚薄二障淺深而顯也云何五性善男子若此二障未得斷滅名未成佛此下正答脩行有幾種性先徵後釋也五性者一凡夫種性二二乘種性三菩薩種性四不定種性五外道種性此初凡夫種性也若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界此二乘種性也以二乘人但斷六識三毒離分段生死故云永捨貪欲經云但盡生死謂為滅度其實未得一切滅度善男子若諸末世一切眾生欲泛如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃此菩薩種性也三賢伏二障地上斷二障論云分別二障極喜無六七俱生地地除若金剛道後異熟已空則二障永斷即入如來大涅槃海善男子一切眾生皆證圓覺逢善知識依彼所作因地法行爾時脩習便有頓漸若遇如來無上菩提正脩行路根無大小皆成佛果此不定種性也若言一切眾生皆證圓覺則各各皆是如來種性矣何有不定之差耶但彼各人所遇善知識依各自脩因地法行而開示之因此脩習則有頓漸不同此不定性在師不在根所謂聞熏成種也若遇大善知識以如來正脩行路開導脩行則根無大小皆成佛果此顯佛性是一因師不定故楞伽要親最勝知識也此則三乘皆不定攝若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎是名眾生五性差別此外道種性也既云一切眾生皆證圓覺無有不成佛者何得有邪良由所遇邪師邪教故成邪耳此但邪師之過非眾生佛性之過也此經圓教大乘無機不攝以因師邪而邪若捨邪歸正無一不成佛者闡提作佛義見於此上答脩習差別下答化生差別善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛皆依無始清淨願力此答菩薩迴入塵勞有幾方便之問也謂菩薩利生方便雖多唯以大悲為首大願持之以同事攝之是為妙行然菩薩度生以四攝法所謂布施愛語利行同事此經重在斷欲為首故獨稱同事為斷愛之妙行也苟非願力所持然同事無不墮者故要依無始清淨願力也若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘依願脩行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺妙莊嚴域此言不但菩薩利生依大願力即末世脩行之人亦當以大願持心故不墮邪見也謂菩薩脩行於大圓覺起增上心者此乃決志成佛之人也故先發願言我今住佛圓覺志願成佛故所求知識莫值外道邪師及二乘劣解壞我善根願得菩薩最勝知識依教脩行漸斷諸障若得障盡願滿則成就佛果矣妙莊嚴域乃佛之果海也爾時世尊欲重宣此義而說偈言彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死若能斷增愛及與貪嗔痴不因差別性皆得成佛道長行言五性因二障而有差別偈言但能頓斷煩惱不拘五性差別則當一時頓成佛果也二障永消滅求師得正悟隨順菩薩願依止大涅槃十方諸菩薩皆以大悲願示現入生死現在脩行者及末世眾生勤斷諸愛見便歸大圓覺於是清淨慧菩薩在大眾中即從座起頂禮佛足右繞三帀長跪叉手而白佛言進問威儀大悲世尊為我等輩廣說如是不思議事本所不見本所不聞我等今者蒙佛善誘身心泰然得大饒益讚謝願為諸來一切法眾重宣法王圓滿覺性一切眾生及諸菩薩如來世尊所證所得云何差別令末世眾生聞此聖教隨順開悟漸次能入此問圓覺妙性聖凡平等因何而有脩證差別也因前云知是空華即無輪轉此則一超頓登佛地不涉漸次矣又云一切眾生皆證圓覺此則本無差別之性矣上問差別佛答以因二障淺深而有今問脩證差別意謂覺性既是平等則二障亦不能為差別故今問從凡至聖脩證云何而有差別也作是語已五體投地如是三請終而復始當機默佇爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為末世眾生請問如來漸次差別汝今諦聽當為汝說讚許時清淨慧菩薩奉教歡喜及諸大眾默然而聽佇聽善男子圓覺自性非性性有循諸性起無取無證於實相中實無菩薩及諸眾生何以故菩薩眾生皆是幻化幻化滅故無取證者譬如眼根不自見眼性自平等無平等者因問覺性是一云何聖凡脩證差別不同故佛先示以覺性本來平等無二菩薩眾生亦無取證次第自性無性故云非性凡聖皆具故云性有隨緣而現故云循諸性起本無脩證次第然後示以妄功用中便顯差別也眼不見眼喻覺性本無能所對待眾生迷倒未能除滅一切幻化於滅未滅妄功用中便顯差別若得如來寂滅隨順實無寂滅及寂滅者此示因眾生迷倒妄有差別其實了無能所取證也下示無差別之差別舊解約天台六即以釋之謂性自平等凡聖不二故云理即上云覺性平等理本一味也今因眾生迷倒幻化未滅妄功用中便顯差別此顯六即差別因迷而有也若究竟窮源寂滅無二若委明六字則不生上慢若悟即字則不生退屈此天台之圓旨也上總示圓理下示六即經義相符故以釋之善男子一切眾生從無始來由妄想我及我愛者曾不自知念念生滅故起憎愛躭著五欲此示理即也以眾生全體在迷約佛性在迷故云理眾生即佛故云理即以迷覺性而為妄想背法身而認五蘊故云由妄想我執妄身為我我見堅固不捨故云及愛我者曾不自知念念生滅造諸惡業然造業者乃佛性也故云理即若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮此名字即也以眾生迷己不知本有佛性若遇善知識開導了悟自性生即無生知本是佛以知名識字即知之一字即佛性也故云名字即若復有人勞慮永斷得法界淨即彼淨解為自障礙故於圓覺而不自在此名凡夫隨順覺性此觀行即也此天台圓教五品觀行位人圓伏五住先斷見思故云勞慮永斷三毒不行故云得法界淨躭著淨境故云淨解為礙無明全在故於圓覺而不自在天台判圓觀行位與別信位同斷見思名為外凡故結名凡夫善男子一切菩薩見解為礙雖斷解礙猶住見覺覺礙為礙而不自在此名菩薩未入地者隨順覺性此相似即也三賢位人觀智增明已見前淨解為礙今已斷之所斷雖亡能斷觀智名為見覺此能見之見覺為礙能所未亡故於圓覺而不自在結名未入地者正指三賢也善男子有照有覺俱名障礙是故菩薩常覺不住照與照者同時寂滅此分真即也照是所照之境乃淨解覺是能觀之智乃見覺即前二位以對待未亡故俱名障礙今地上菩薩已證平等真如以即體之智還照寂滅之體故照而非照不住照功故云常覺不住以理智一如故同時寂滅譬如有人自斷其首首已斷故無能斷者則以礙心自滅諸礙礙已斷滅無滅礙者此以喻明觀智俱泯能所兩忘也人喻能照首喻所照所照既亡能照亦泯故喻無能斷者然以照為礙者楞嚴云圓明照生所以圓明體中本無能所但起一照心則形所相故以照為礙也以諸無明通名諸礙非照不滅故以礙滅礙也若諸礙已斷則照亦不立故無滅礙者脩多羅教如標月指若復見月了知所標畢竟非月一切如來種種言說開示菩薩亦復如是此顯地上菩薩之實證也謂菩薩脩行未悟自性故佛假種種言教開示為悟心之方故如指指月今既了悟自心則一切言說皆剩法矣故如見月知指非月也以凡有脩斷觀智能所之說皆標月之指耳今既證一心則能所雙忘觀照俱泯同時寂滅矣此名菩薩已入地者隨順覺性此結位也此經單以圓照覺相為宗故位次不說所斷但約觀行淺深以明位之高下若對普賢章中云應當遠離一切幻化虗妄境界由堅執持遠離心故即淨解未忘當觀行位心如幻者亦復遠離即見覺為礙當相似位有覺有照同時寂滅即遠離為幻亦復遠離當分真位下言一切障礙即究竟覺即離遠離幻亦復遠離得無所離名究竟覺當究竟即經旨了然幸深觀之善男子一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚痴通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及婬怒痴俱是梵行眾生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫法界海慧照了諸相猶如虗空此名如來隨順覺性此究竟即以示平等佛慧也其得念失念等十對等法皆迷悟邊事良以圓覺妙性不屬迷悟對待因果故一切寂滅平等一如以妄見而觀則有二相若以法界海慧照之則猶如虗空一切諸相了不可得矣善男子但諸菩薩及末世眾生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實此的示平等安心之妙也上言位有高下證有次第者皆為不了寂滅心體妄有脩證不忘能所對待故悟有淺深今示平等一心任運合道乃圓悟頓證之妙旨也以眾生日用現證全是如來平等法身若一念不生全體自現故云居一切時不得故起妄念以纔起一念即迷現量故也謂眾生妄想本自無性元是真心若息妄求真似斬頭覓活故云於諸妄心亦不息滅以妄想境界本是一真不容擬議若更加了知之心即是揚聲止響故云住妄想境界不加了知不加了知處即是真知若起心更辨別求真實則頭上安頭彌增顛倒故云於無了知不辨真實此道人日用安心的訣苟能任運如斯則心心合道念念證真不起滅定而現度生事業矣從上諸祖未有不入此法門者此參禪向上一路所謂衲僧巴鼻也彼諸眾生聞是法門信解受持不生驚畏是則名為隨順覺性此直指頓悟安心乃脩行之要也此法門即上居一切時等以此法難信難解難持若聞而不生驚怖者可謂善能隨順覺性也善男子汝等當知如是眾生已曾供養百千萬億恒河沙諸佛及大菩薩植眾德本佛說是人名為成就一切種智此結上頓悟任運合道之機皆夙因深厚者方能信受不疑也此等之人雖居因位決定成佛無疑矣爾時世尊欲重宣此義而說偈言清淨慧當知圓滿菩提性無取亦無證無菩薩眾生此頌覺性平等本無差別覺與未覺時漸次有差別眾生為解礙菩薩未離覺入地永寂滅不住一切相大覺悉圓滿名為徧隨順初二句總頌差別所以眾生一句觀行即菩薩一句相似即入地二句頌分真即大覺二句頌究竟即然初句覺與未覺亦該攝理即名字即也末世諸眾生心不生虗妄佛說如是人現世即菩薩供養恒沙佛功德已圓滿雖有多方便皆名隨順智末二句總頌位行雖差皆隨順覺性
