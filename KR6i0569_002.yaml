body:
  text: 唐罽賓國沙門佛陀多羅譯明匡山逸臾憨山釋德清解明新安程夢暘覺我較閲於是威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言進問威儀大悲世尊廣為我等分別如是隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利此慶聞讚謝也以聞佛圓音所流大智教光灌大衆心神力所加照破無明各各自心光明頓現此所以不因修習而得善利也下請入門方便世尊譬如大城外有四門隨方來者非止一路一切菩薩莊嚴佛國及成菩提非一方便惟願世尊廣為我等宣説一切方便漸次并修行人總有幾種令此會菩薩及末世衆生求大乘者速得開悟遊戲如來大寂滅海此問行也由上但聞所證之差別未聞能證之行故今特請入門之方便也城喻圓覺門喻所入之路方便正是入證之行即楞嚴之最初方便所謂隨方取便乃下手之工夫也漸次者以初圓照二字為成佛因地故初云知是空華即無輪轉知幻即離不作方便乃圓修頓悟故不假方便乃上上根人之行今為中下故請漸次意在開三觀門即下單復圓修二十五輪皆漸次也作是語已五體投地如是三請終而復始此敘求法懇誠爾時世尊告威德自在菩薩言善哉善哉汝等乃能為諸菩薩及末世衆生問於如來如是方便汝今諦聽當為汝説讚許誡聽於是威德自在菩薩奉教歡喜及諸大衆默然而聽此欣承法音冥心佇聽也正示善男子無上妙覺遍諸十方出生如來與一切法同體平等於諸修行實無有二此示法性圓滿本無迷悟平等無二但契一真不假多行故云於諸修行實無有二方便隨順其數無量圓攝所歸循性差別當有三種此正入證之門也然覺性遍滿一切諸法則法法皆為入證之門但隨機圓攝不無其要故但有三門然此三門即楞嚴三觀謂空假中也且二經列三名同一梵語謂奢摩他三摩鉢提禪那古釋奢摩他此翻云止以寂靜為相義當空觀三摩鉢提此翻云等至亦名等持以幻化為相義當假觀禪那此翻云靜慮雙離靜幻以寂滅為相下義當中觀然修證必須三觀者以如來藏心具三諦理謂空不空空不空此以三觀各照一諦圓攝一心故曰圓照以一心圓照則為頓三觀次第各照故為漸其實本無三一次第之差也後文自明初奢摩他善男子若諸菩薩悟淨圓覺此標行本乃悟後稱性修非迷中修也謂菩薩修行先要了悟本有淨圓真心依此不生不滅真心安立觀行淨治歷劫無明習氣以此為修唯約稱性為修耳以淨覺心取靜為行由澄諸念覺識煩動靜慧發生身心客塵從此永滅此示空觀行相也發覺初心以靜為首以未悟時一向妄想動亂今既悟此心即以所悟覺心發起觀照返觀不動之心體故云取靜為行由此妄想消歇則見阿賴耶中習氣生滅之相故云由澄諸念覺識煩動久久觀察則自心光明忽然發現故云靜慧發生心光一發則頓見身心幻妄本來不有故如客塵如此則內脫身心故云永滅此最初工夫一念頓證無生也便能內發寂靜輕安由寂靜故十方世界諸如來心於中顯現如鏡中像此示入觀之效也以圓覺妙心向以幻妄身心無明遮障今身心既脫則無明重擔歇滅故云內發寂靜輕安到此十方廓然則本有法身挺露故云諸如來心顯現如鏡中像所謂諸佛法身入我性我心還共如來合乃妙契法身此正楞嚴返流全一六用不行十方國土皎然清淨譬如琉璃內懸明月乃至一切如來密圓淨妙皆現其中當圓教頓破無明之相也此方便者名奢摩他結名也奢摩他此翻云止寂靜義在因名止在果名定義當空觀次三摩鉢提善男子若諸菩薩悟淨圓覺以所悟淨圓覺心而為行本以淨覺心知覺心性及與根塵皆因幻化即起諸幻以除幻者變化諸幻而開幻衆由起幻故便能內發大悲輕安此示假觀行相也心性識也謂依所悟淨圓覺心發起智照照彼識與根塵本來不有皆因無明之所變現雖有而性常自空故云皆因幻化然幻化指枝末無明也既了自己識及根塵悉如幻化則例觀一切衆生一一如幻故云即起諸幻以除幻者諸幻謂幻智此幻者推根本無明謂依如幻始覺之智頓破根本無明變化等者謂除滅無明自然而有不思議業用故云變化諸幻而開幻衆廣作度生佛事現十界身普應一切此出真涉假之行相也由起幻等者謂已證真如從真如起利生事業而以同體大悲廣化衆生不取衆生之相故云大悲輕安一切菩薩從此起行漸次增進彼觀幻者非同幻故非同幻觀皆是幻故幻相永滅此示觀行增進之相也以證性未圓無明未淨漸漸深入故云漸次以對待未忘先遣所觀之境猶存能觀之智故云彼觀幻者非同幻故觀幻者觀即能觀之智幻者即所觀之境真智獨存故不同彼幻然所觀既妄能觀亦泯若存能觀猶未離幻故云非同幻觀皆是幻故能所雙忘境智俱絶唯一真心故云幻相永離是諸菩薩所圓妙行如土長苗此喻增進之相也謂菩薩觀行境智雙忘一真獨立則法身真地智種靈苗漸漸增長土喻法身真地本覺真如如種子觀智增明如苗長此方便者名三摩鉢提此結觀名也梵語三摩鉢提此云等至等持之中能至聖位故三禪那善男子若諸菩薩悟淨圓覺此標行本以淨覺心不取幻化及諸淨相了知身心皆為罣礙無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出於外煩惱涅槃不相留礙此正示中觀行相也謂依所悟淨圓覺心建立觀行直觀中道一心外忘其境故云不取幻化內忘其智不取靜相境智俱忘身心寂滅皆無障礙故云了知知覺明乃根本無明也謂對待既忘能所不立則無明淨盡故云無知覺明境智俱空故云不依諸礙以離境故超礙離智故超無礙畢竟寂滅故云永得超過鍠乃鐘鼓之聲言雖有體質而不礙聲之遠達正取器微聲大以明即礙處能達無礙意謂向心境未忘則身心世界為礙今既了悟法身即此幻妄身心世界不礙法身故云受用世界及與身心相在塵域如器中鍠聲出於外以喻法身出礙也煩惱約生死法謂身心世界也涅槃約理智唯一真心故生死涅槃不相留礙也便能內發寂滅輕安妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想此示觀行成益之相也以生滅既滅寂滅現前三德圓證涅槃常樂故云寂靜輕安心心隨順妙覺寂滅故云自他身心所不能及衆生壽命皆為浮想此則二障永斷二死永忘所謂究竟一心之極證也此方便者名為禪那此結名也善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺此總結方便之漸次也謂此三法門皆是隨順親近圓覺之方便即如來之因地諸菩薩之萬行或漸次或偏圓皆依如是三種事業或單復圓修若一念圓證即成圓覺善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃順修習此結行顯勝也偏圓修習日劫相倍故教多多二乘不若暫聞此法以是成佛正因故爾時世尊欲重宣此義而説偈言次以偈重宣威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類總頌標立三種觀行寂靜奢摩他如鏡照諸像如幻三摩地如苗漸增長禪那唯寂滅如彼器中鍠此頌三種行相三種妙法門皆是覺隨順十方諸如來及諸大菩薩因地得成道三事圓證故此總頌結名於是辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言初進問威儀大悲世尊如是法門甚為希有慶讚世尊此諸方便一切菩薩於圓覺門有幾修習此正陳問意也謂前佛説三觀未審菩薩所修為一人具三為三人各一為同時為次第故請開示以便修習也願為大衆及末世衆生方便開示令悟實相此問所為也作是語已五體投地如是三請終而復始三展虔誠爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習汝今諦聽當為汝説誡聽許説時辨音菩薩奉教歡喜及諸大衆默然而聽佇聽善男子一切如來圓覺清淨本無修習及修習者一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪此總答問意也圓覺淨性衆生本具不假修習但今在迷中以幻修幻唯以幻力故有二十五種之不同蓋三觀一心元無別異第各隨人意要偏重所習展轉而為二十五輪非定有二十五種也然二十五種不出三觀單復圓修而分差別初單修三觀若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起於座便入涅槃此菩薩者名單修奢摩他此單修空觀也然三諦本唯一境故三觀本乎一心圓融該攝舉一即具三言三體即一所謂正偏帶兼故雖單修一觀必兼餘二雖不明説義即全具今言唯取極靜是以觀空為主由靜力故永斷煩惱則義該於假以煩惱幻化以靜力斷之若究竟成就圓證一心則攝中也故不起於座便入涅槃此單以圓修空觀而入也能作如是觀義方滿足標名應有悟淨圓覺四字譯人略耳若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧此菩薩者名單修三摩鉢提此單修假觀也佛力者謂自性本具真如佛性內熏之力故發起種種變化作用備修妙行此依幻行於陀羅尼不失寂念則全體起用兼攝一心中道寂滅之體而起空慧照破無明是以假攝中空也若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡便證實相此菩薩者名單修禪那此單修禪那中觀也唯滅諸幻獨斷煩惱乃攝假入中煩惱斷盡便登實相乃攝空入中正遮照同時以顯中也以唯滅斷盡則雙遮獨斷便證則雙照此上單修三觀也下復修二十一輪每觀領七故二十一初空觀頷七先復二觀二初先空後假若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提次先空後中若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那即體之智故云靜慧還照寂體故云證至靜性便斷煩惱永出生死因亡果喪圓證一心故為中道次復三觀二初先空次假後中若諸菩薩以寂靜慧復現幻力種種變現度諸衆生後斷煩惱而入寂滅此菩薩者名先修奢摩他次修三摩鉢提後修禪那次先空次中後假若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸衆生此菩薩者名先修奢摩他中修禪那後修三摩鉢提次齊修三觀有三初先靜齊寂幻若諸菩薩以至靜力心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那次先齊靜幻後寂若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那後齊靜寂後幻若諸菩薩以至靜力用資寂滅後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提上靜觀七輪已竟下幻觀七輪初先幻後靜若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他次先幻後寂若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那上復二後復三初先幻次靜後寂若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那次先幻次寂後靜若諸菩薩以變化力無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他後齊三觀三初先幻靜寂若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那次齊幻靜後寂若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那後齊幻寂後靜若諸菩薩以變化力資於寂滅後住清淨無作靜慮此菩薩者名齊修三摩鉢提禪那後修奢摩他三寂觀領七復二有二先寂後靜若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他次先寂後幻若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提次復三有二初先寂次靜後幻若諸菩薩以寂滅力種種自性安於靜慮而起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提次先寂次幻後靜若諸菩薩以寂滅力無作自性起於作用清淨境界歸於靜慮此菩薩者名先修禪那中修三摩鉢提後修奢摩他後齊三有三初先寂齊靜幻若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提次齊寂靜後幻若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提後齊寂幻後靜若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修禪那三摩鉢提後修奢摩他後圓修三觀若諸菩薩以圓覺慧圓合一切於諸性相無離覺性此菩薩者名為圓修三種自性清淨隨順此圓修三觀乃三觀一心一念具足即初云圓照清淨覺相圓覺圓合即圓照一切則該十法界於諸性相無離覺性即清淨覺相諸佛本起因地唯一心圓照法界以為妙行故二十五輪究竟歸極於此意顯此一觀以為圓修其二十四皆隨根耳善男子是名菩薩二十五輪一切菩薩修行如是若諸菩薩及末世衆生依此輪者當持梵行寂靜思惟求哀懺悔經三七日於二十五輪各安標記至心求哀隨手結取依結開示便知頓漸一念疑悔即不成就此總結勸修也當持梵行者所謂因戒生定即楞嚴三種漸次乃入禪之基本也寂靜思惟懺悔即觀罪性空所謂若欲懺悔者端坐念實相也求哀結標以驗根之頓漸乃請諸聖神力加持起決定信耳爾時世尊欲重宣此義而説偈言辨音汝當知一切諸菩薩無礙清淨覺皆依禪定生所謂奢摩他三摩提禪那三法漸次修有二十五種十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順二十五輪皆菩薩因行頌言十方如來意約所趣之果此正如來因地法行也頓覺人則不須漸次法不隨順者乃闡提不信之人則漸亦不能入矣一切諸菩薩及末世衆生常當持此輪隨順勤修習依佛大悲力不久證涅槃此頌結勸也於是淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言問法威儀大悲世尊為我等輩廣説如是不思議事一切如來因地行相令諸大衆得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰此慶所聞也謂從一心建諸定輪乃諸如來因地行相勤苦境界一念具見故深自慶也世尊若此覺性本性清淨因何染污使諸衆生迷悶不入此正問也上章佛説一切如來圓覺清淨本無修習然清淨則本來無染今因何有染污更假修耶唯願如來廣為我等開悟法性今此大衆及末世衆生作將來眼此請意也説是語已五體投地如是三請終而復始求法懇誠爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便汝今諦聽當為汝説讚許時淨諸業障菩薩奉教歡喜及諸大衆默然而聽默佇善男子一切衆生從無始來妄想執有我人衆生及與壽命認四顛倒實為我體由此更生憎愛二境於虗妄體重執虗妄二妄相依生妄業道有妄業故妄見流轉厭流轉者妄見涅槃此正答染污所以也一切衆生從無始來妄想執有我人等者正初所云妄認四大為自身相六塵緣影為自心相者也由諸衆生最初不覺迷本法身故妄認五蘊幻妄身心為實我體故名我相計我展轉趣於餘趣故名人相計我盛哀苦樂變異相續為衆生相計有一期命根不斷為壽者相以不達無我執妄為真故云顛倒然執虗妄為我已是顛倒且於此妄我起憎愛之心故云重執虗妄此起惑也心境二妄相依造種種業故云生妄業道此造業也故有妄業必受苦報流轉生死此苦果也惑業苦三皆因妄認我執以取三界輪回故云流轉此分段生死也若二乘人厭生死苦斷煩惱集出三界外復妄見涅槃以取變易生死之苦皆由執我之故也故云由此更生等然此四相有迷識迷智粗細之分粗者迷識乃凡夫妄認五蘊為我妄生憎愛乃金剛經前半所明者是也細者迷智乃一切聖賢妄有證得能所未忘即此經所説乃金剛經後半所明者是也此中粗細二種我執正屬俱生此經衆生意該九界此中先舉凡夫之四相以顯三乘之四相以凡夫四相由憎愛而有三乘四相由證取而有以證取發於愛根種子故凡聖雙舉由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故是故動念及與息念皆歸迷悶此正答不能入覺之所以也由上所説妄執我故染污真性由此不能入清淨覺蓋非覺性違拒不容入也以執我能入覺故云有諸能入非覺入覺耳若以覺入覺則如空合空又何拒之有以我執未忘故凡夫動念二乘息念皆歸迷悶下重徵釋迷悶之本何以故由有無始本起無明為己主宰此徵釋迷悶之根本也本起無明謂最初一念不覺生相無明也法身無我由一念無明迷本法身成陀那識為我相根本自此皆是無明用事故云為己主宰我者主宰義謂從無始至今一向皆是無明主宰是為我相自等覺已還未破生相無明異熟未空皆屬我相然此我相與諸教所説不同後文自明一切衆生生無慧目身心等性皆是無明譬如有人不自斷命此重釋無始無明至今難斷之所以也謂全體無明變成五蘊身心然此根本無明非根本智照不能破以諸衆生從來未逢知識開發慧眼照破豈有無明能斷無明之理耶故云譬如有人不自斷命是故當知有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就此序無明相續長劫之所以也謂此無明相續長劫而難斷者以有憎愛二惑以滋養之也以執我故則偏愛我若有愛我者則更增長我之愛見若違我者必生憎怨然憎怨亦從愛起以不順其愛故憎怨耳以此憎愛資熏無明種子發起現行故劫劫生生愛憎未斷故無明日厚所以相續長劫生死耳今以愛憎之心而求佛道豈有成道之理耶故云皆不就下示相善男子云何我相謂諸衆生心所證者此正示我相之體也此我等四相舊解都分粗細今詳佛意指無始無明為己主宰是為我體是則四相單約生相無明今以觀照研窮對待未忘展轉有四原非粗細之分也何以明之謂妙性圓明本無能所良由最初一念障此妙性失其本明故名無明自爾以來一向皆是無明為己主宰而為我體今以始覺觀照欲證圓覺未能圓合中間皆因根本無明而為障礙故對待未忘即此所對所證者乃是無明非覺性也故云心所證者乃我相也按此始起無明為我豈有粗細之分耶永嘉一念中五陰正此意耳智者請深觀之下以喻明善男子譬如有人百骸調適忽忘我身四肢絃緩攝養乖方微加針艾則知有我是故證取方現我體此以喻明我相也謂衆生向以無明用事不知有我任運而已故如人調適忘身今以觀照研窮方顯無明之體故如人針艾知有我身也以觀心所取證者乃是無明非覺性也故云取證方現我體前佛明言無始無明為己主宰乃的指根本無明為我豈可以粗惑目之耶下結指善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相此結指我相根本也意謂不獨三賢十聖之所證者為我乃至證於如來究竟涅槃若一念證性未忘乃生相無明未破正是我相根本雲門云法身亦有兩般病得到法身邊若法執不忘己見猶存亦是病問曰三乘教中説俱生我執七地已破其八地後乃俱生法執破此法執即入妙覺今經等覺後心猶未破我相何相懸若此耶答曰然我法二執總屬一我謂我之我我之法然俱生法執正是我所執之法故法亦名我以異熟未空故但約證取為我耳此經不同諸説以四相總屬一我故云皆是我相次人相善男子云何人相謂諸衆生心悟證者善男子悟有我者不復認我所悟非我悟亦如是悟己超過一切證者悉為人相此示人相也謂前所證者是我則不復認我若存我能悟之心即為人相以約對我為人非他人也善男子其心乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相此釋人相也謂縱然悟得涅槃是我不自證取即此能悟之心皆名人相彈盡也謂了悟涅槃極盡之理為我若存絲毫悟心未忘即名人相善男子云何衆生相謂諸衆生心自證悟所不及者此示衆生相也謂覺前證悟二皆是妄即此覺了之心名衆生相以此覺了之心非證悟之可及者以見有證悟之可離故名衆生相善男子譬如有人作如是言我是衆生則知彼人説衆生者非我非彼云何非我我是衆生則非是我云云何非彼我是衆生非彼我故此借明衆生相也以凡夫之衆生相乃計我所感苦樂變異相續為衆生相今聖人但以了悟證取兩忘能所只存能了之心為衆生相以不屬能所故借世人彼此之語以喻明之謂言我是衆生故非我非彼下結指善男子但諸衆生了證了悟皆為我人而我人相所不及者存有所了名衆生相此正示其相謂了前證悟二皆不及只此了心不忘為衆生相耳善男子云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根此示壽命相也謂前能了之心為衆生相今觀智增明照此了心亦不可得唯一清淨覺體所謂覺心源故名究竟覺到此境智俱泯一切俱離謂以即心之智還照寂滅之體境智一如如眼不見眼故云一切業知所不自見以返妄歸真至法身極則處但守住寂滅不能轉位回機所謂抱守竿頭靜沉死水宗門名為尊貴墮即此墮處不能超越故猶如命根為壽命相語云百尺竿頭坐的人雖然得入未為真百尺竿頭重進步大千世界現全身故以坐守玄微命根不斷前云不住生死不住涅槃此正住涅槃相耳善男子若心照見一切覺者皆為塵垢覺所覺者不離塵故如湯消氷無別有氷知氷消者存我覺我亦復如是此直示妄源也一切覺者前三相也謂心照清淨覺前三相皆為塵垢即此覺心亦未離塵然以真照妄妄即是真故如湯消氷氷即是湯今存我覺我則如氷知氷以不能自遣如不自斷命所以為壽者相也下明我為法障善男子末世衆生不了四相雖經多劫勤苦修道終不能成一切聖果是故名為正法末世此明我為障道之本也謂末世衆生若不了此四相縱多劫勤苦終不能成聖果以執我見而修故也正法末世謂末世衆生幸遇此圓教法門可為正法若錯亂修習與不修等故無行證所以為末法也釋迦法中正法一千年教理行果四法皆全像法一千年有教理行而證果者少末法一萬年但有教理而無行證今教理雖存而徒勞無益者多矣下有三徵三釋此久修無證之義何以故此徵何故久修無證耶下釋認一切我為涅槃故有證有悟名成就故譬如有人認賊為子其家財寶終不成就釋義謂所以久修不證者以認一切我為涅槃故以證悟未忘得少為足故言認一切我者謂凡所修行皆依我見將此我見以為涅槃故終不成就耳認賊為子喻終不成就何以故此徵何故認我便妨於道耶有愛我者亦愛涅槃伏我愛根為涅槃相有憎我者亦憎生死不知愛根真生死故別憎生死名不解脫釋義所以認我妨道者以我為愛憎之根本故也謂凡執我者必愛我今以我愛而求涅槃則涅槃但資愛根非真涅槃也故云伏我愛根為涅槃相故非真也凡不順我愛者必起憎心以有憎我者亦憎生死然此憎心本從愛起不知此愛真生死本故今修行人不知斷己愛根而別憎生死迷之甚也故不解脫然説認我妨道者以愛資愛故也云何當知法不解脫此徵云何當知愛涅槃者本解脫法何以返不解脫耶善男子末世衆生習菩提者以己微證為自清淨猶未能盡我相根本釋義所以於涅槃法不解脫者以執我而求以取微證便自以為清淨得少為足未盡我相根本故不解脫耳下以境驗知不解脫處若復有人讚嘆彼法即生歡喜便欲濟度若復誹謗彼所得者便生嗔恨潛伏藏識遊戲諸根曾不間斷此以違順二境以驗我相未忘也言修行人自謂已得涅槃法矣假若有人讚嘆彼法則生歡喜誹謗彼法則生嗔恨然涅槃乃空法也何有喜怒於其間今聞讚誹而生喜怒即此喜怒本於我相非涅槃也以此驗知其人我相堅固執持以此種子潛伏藏識遇境擊發現行則遊戲諸根曾不間斷以此求道云何而得解脫耶善男子彼修道者不除我相是故不能入清淨覺此總結執我求道之過也下翻顯病源善男子若知我空無毀我者有我説法我未斷故衆生壽命亦復如是此以法驗病翻顯我相未忘也然涅槃乃空法也若果證涅槃則我相必空我相若空則何有讚毀哉今因讚毀其法而生喜怒正是我相未斷若我相未斷則人及衆生壽命四相居然全在如此正是衆生病根又豈可為得涅槃耶下正示病源善男子末世衆生説病為法是故名為可憐愍者雖勤精進增益諸病是故不能入清淨覺此正示病源也謂末世修行之人未斷我相以認我為法故所説者乃説其我相之病非説涅槃之法也故云説病為法以此之故雖精進修行但增益諸病故不能入清淨覺耳是故名為可憐愍者下示執病之過善男子末世衆生不了四相以如來解及所行處為自修行終不成就此示執病為法之過也謂修行之人不了四相但以如來解行回為己有非己親證故終不成就或有衆生未得謂得未證謂證見勝進者心生嫉妬由彼衆生未斷我見是故不能入清淨覺此示執病之過必墮增上慢人也其實未得未證而自謂為證得得少為足故為增上慢乃是我愛未斷者何以知之但於見勝進者心生嫉妬然此嫉妬之心發於我愛故知此人乃未斷我愛者是故不能入清淨覺此甚言我愛為病根也下誡訪過善男子末世衆生希望成道無令求悟唯益多聞增長我見此深誡防過也謂上執病為法之人所以四相未除者秪是將心待悟一事為病根耳苟有待悟之心則必廣求經教執相似語回為己解故此但只增益多聞增長我見非真修也末法志道之士可不懼哉但當精進降伏煩惱起大勇猛未得令得未斷令斷貪嗔愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅佛説是人漸次成就求善知識不墮邪見此勸真修也真修之士不必將心待悟亦不必廣求多聞只當降伏煩惱為第一行亦不可得少為足其未得涅槃必志得之其於未斷煩惱決欲斷之但歷境驗心若貪嗔愛慢一切煩惱對境果然不生否至若彼我恩愛果然一切寂滅否如此自驗其心即如古德云學道不必將心求悟但於一切煩惱境界上透得過便是悟處故佛説此人漸次可以成就雖然如是更要求善知識決擇邪正分明亦不墮於邪見如此修行方有少分相應耳學者可不勉哉若有所求別生憎愛則不能入清淨覺海此重勉真修誡令離過也謂必如上所説乃是真修若捨此外別起欣厭取捨憎愛之心則畢竟不能入清淨覺矣爾時世尊欲重宣此義而説偈言淨業汝當知一切諸衆生皆由執我愛無始妄流轉未除四種相不得成菩提愛憎生於心諂曲存諸念是故多迷悶不能入覺城城喻涅槃謂此涅槃魔外不能侵萬德之所聚衆聖之所歸萬行之所入故喻如城若能歸悟剎先去貪嗔癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見所求別生心究竟非成就剎乃世界之都稱亦取喻涅槃心愛涅槃故云法愛餘頌可知於是普覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言進問威儀大悲世尊快説禪病令諸大衆得未曾有心意蕩然獲大安隱讚謝世尊末世衆生去佛漸遠賢聖隱伏邪法增熾使諸衆生求何等人依何等法行何等行除去何病云何發心令彼羣盲不墮邪見此正陳所問也此問有五一問求何等人下答求善知識二問依何等法三問依何等行四問除去何病此三總答依所證法應離四病五問云何發心末後發廣大等心下文俱明作是語已五體投地如是三請終而復始三展翹勤爾時世尊告普覺菩薩言善哉善哉善男子汝等乃能咨問如來如是修行能施末世一切衆生無畏道眼令彼衆生得成聖道汝今諦聽當為汝説讚許誡聽時普覺菩薩奉教歡喜及諸大衆默然而聽佇聽下答有五初答求人善男子末世衆生將發大心求善知識欲修行者當求一切正知見人心不住相不著聲聞緣覺境界雖現塵勞心恆清淨示有諸過讚歎梵行不令衆生入不律儀求如是人即得成就阿耨多羅三藐三菩提此答求何等人也善知識謂善知衆生根器應機説法知病説藥令得安隱也正知見人即心不住相不著二乘之行者雖現塵勞等六句言善知識之行也菩薩居塵不染故云心恆清淨以同事攝故云示有諸過先以欲鈎牽後令入佛智故云不令衆生入不律儀求如是人即得成就無上正道也末世衆生見如是人應當供養不借身命彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢況復摶財妻子眷屬若善男子於彼善友不起惡念即能究竟成就正覺心華發明照十方剎此教承事知識之法範也不惜身命如雪山捨身常啼破骨乃至身為床座等四儀常現清淨者乃善知識之順行也固當盡命承事即有逆行示現貪嗔癡等如婆須密女無厭足王之類亦不敢起憍慢心況復摶財等耶摶乃摶食財乃財寶意謂內現貪嗔尚不敢慢何況身外摶食財寶妻子眷屬乃人道之常如淨名之類又豈可慢之耶若修行者於彼逆行知識不起惡念所謂依法不依人即能究竟成就也永斷疑根直心正念故得心華發明照十方剎下答所依法善男子彼善知識所證妙法應離四病此答所依法意在擇師乃求正知見人也修行依法法必依師故在所擇正知見人乃可依也如何得知是正知見人但於法驗之若所説法心住相者則為法病若離法病則知見自正故從上諸祖拈情去縛曾無實法繫人是為不住相者若此乃可依也云何四病一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病此徵釋四病之相一作病也然作為病者以圓覺之性天然本具不假作為今以有作之修而求圓覺妙性且此妙性豈作為而可求耶故説為病若復有人作如是言者假若彼知識自作此言也二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故説名為病此示任為病也然此任病乃狂解之人悠悠任性縱放身心自謂無拘無礙得大解脫返借口本無生死可斷本無涅槃可證以為放逸之資非真知見善知識也若依此等之人則墮狂妄故説任性為病也三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故説名為病此示止為病也然圓覺普照大用無方豈可以永息諸念耽著枯寂之行以求之耶以圓覺妙性非止可合故説為病耳四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故説名為病此示滅為病也覺性圓滿隨緣應現寂而常照今以畢竟空無所有則幾淪斷滅以永寂滅而求圓覺久則不沉無想則墮二乘故為病耳離四病者則知清淨作是觀者名為正觀若他觀者名為邪觀此結示正觀也初云圓照清淨覺相以圓覺妙性本不屬於作止任滅今離此四則自性圓明本無欠缺故云清淨然作止等四皆屬修行功用今説為病者以在未悟門頭此四皆藥今就圓覺自性言之本自天然不假功用故説為病耳古德云修行即不無染污即不得所謂但形文彩即屬染污故離此四則名清淨作是觀者乃約法觀人非觀智也謂觀離病之人乃不住相為正知見人方取為師可依之也善男子末世衆生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷嗔恨現逆順境猶如虗空了知身心畢竟平等與諸衆生同體無異如是修行方入圓覺此答修何等行也此中修行不説六度萬行但只事善知識斷憍慢心一行為本即如善財童子一生圓曠劫之果唯以參善知識一事即得圓滿無量法門所謂依善知識教不生二念故觀合離逆順之境猶如虗空且了知身心與衆生平等此無人我相乃受道之器也以此心此行方與圓覺法體相應故能入耳善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫若復有人觀彼怨家如己父母心無有二即除諸病於諸法中自他憎愛亦復如是此答除去何病也衆生所以流轉生死者以有無始無明愛憎種子為障道之病根故雖修行未得解脫今事善知識不起憍慢嗔恨之心則折伏現行了知自己身心與衆生平等則了無人我愛憎種子自伏至若視怨如親則愛憎種子自斷而障道之病自斷故云即除諸病此正除病之妙藥也善男子末世衆生欲求圓覺應當發心作如是言盡一切虗空一切衆生我皆令入究竟圓覺於圓覺中無取覺者除彼我相一切諸相如是發心不墮邪見此答發何等心也般若彌勒頌云廣大第一常其心不顛倒此言盡空一切衆生廣大心也皆入究竟圓覺第一心也於圓覺中無取覺者常心也除彼我人一切諸相即除四病不顛倒心也凡諸行人親師授法修行之要無出此者捨此即墮邪見矣故云如是不墮爾時世尊欲重宣此義而説偈言普覺汝當知末世諸衆生欲求善知識應當求正見心遠二乘者此頌求師法中除四病謂作止任滅此頌依法去病親近無憍慢遠離無嗔恨見種種境界心當生希有還如佛出世不犯非律戒戒根永清淨此頌修行不犯非律儀二句長行言在師示現有過不令衆生入不律儀此中正言弟子事師倘見逆行不得隨之便犯非律必以戒根永清淨而為正行舊解為追頌求師中文非本指也度一切衆生究竟入圓覺無彼我人相當依正智慧便得超邪見證覺般涅槃此頌發心也五句頌四心因行末句顯果證於是圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言進問威儀大悲世尊為我等輩廣説淨覺種種方便令末世衆生有大增益慶前所聞世尊我等今者以得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首唯願大悲為諸大衆及末世衆生施大饒益正陳請詞以何為首即最初方便也作是語已五體投地如是三請終而復始三展虔誠爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生汝今諦聽當為汝説許説誡聽時圓覺菩薩奉教歡喜及諸大衆默然而聽默佇善男子一切衆生若佛住世若佛滅後若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安居徒衆有緣事故隨分思察如我已説此下正答所請也性謂種性猶根器也以圓覺乃祕密妙心非上根人不能修習故許具大乘根性者可修也意謂若無外緣則當安居伽藍與衆同修若有外緣不能安居者則當隨分思察也已説者如前當觀此身等若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十日安置淨居此教結制規則也意謂苟無外緣必以安居為上易入道也三期隨意長短元無一定但取克期進道耳若復現在當正思惟若佛滅後施設形像心存目想生正憶念還同如來常住之日懸諸幡華經三七日稽首十方諸佛名字求哀懺悔遇善境界得心輕安過三七日一向攝念此教安居進修之法則也若如來在世則當正思惟佛若佛滅後則當設像觀佛法身故云還同常住懸諸幡華廣如楞嚴壇場今此中至簡故但舉幡華言懺悔得善境界者謂見光覩瑞感夢等乃滅罪之相也一向攝念則修正觀應如二十五輪各安標記結取單復圓修乃正行也若經夏首三月安居當為菩薩清淨住止心離聲聞不假徒衆此言入期之法言菩薩住止意揀小乘之衆也前言三期乃克定期限今結安居乃入期之法西域佛制三月安居通名結夏今言夏首乃入期之初也律制當結制時必先集衆布薩作法然後安居多小乘人今言菩薩住止者謂不同彼小乘多衆但隨一類修觀行菩薩自便不必念彼小乘布薩法事亦不假彼徒衆也此言不假小乘徒衆非與前文安處徒衆相違也至安居日即於佛前作如是言我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆此示入期安心之法也上言心離聲聞此正示菩薩所修乃離相寂滅之行不比聲聞著相而修也以大圓覺為伽藍者謂不依世界住止乃住心境雙忘平等寂滅之地謂涅槃自性本無身心世界可繫屬故殊非聲聞境界故云不依唯依如來法身實際故為菩薩所修妙覺因緣乃自覺聖智之境為自證處也此乃菩薩獨詣之地故云不繫徒衆某甲者以甲乙為名之次乃當自稱己名也今諸方後進見善知識不自稱名但曰某甲無知之甚也善男子此名菩薩示現安居過三期日隨往無礙此結示休夏也言示現安居者以上言菩薩修寂滅行安居平等性智此又何假期限耶然必以三期為限者以示同權小引發未悟耳過期隨往無礙者以小乘解制之後有新學者凡所出遊侶須三人以妨誤失今菩薩以觀知安心不必伴侶故云隨往無礙善男子若末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取此示妨誤失也所聞者即上三觀單復圓修二十五輪及根塵識界一一清淨等乃正觀也若非所聞一切境界皆不可取如楞嚴五十重陰魔及起信論中所説魔事皆不可取恐墮邪誤也初有二問一問安居二問三觀以何為首上答安居竟下答初首方便善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界一復如是善男子若覺遍滿一切界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是非彼所聞一切境界終不可取此答三觀初首先空觀方便也言修奢摩他先取至靜者以止為前方便也言至靜者即天台三止中體真止謂體合真空故云至靜一念不生故不起思念靜極光生故云便覺初從一身等者謂內脫身心外遺世界內外平等寂然不動以身心世界蕩然一空則與一切融為一心一切世界合為一界故凡衆生起心動念即從自心中現故凡起一念無不了知所謂靜極光通達寂照含虗空却來觀世間猶如夢中事此空觀之極則也如此方名正觀非彼所聞皆不可取善男子若諸衆生修三摩鉢提先當憶想十方如來十方世界一切菩薩依種種門漸次修行勤苦三昧廣發大願自熏成種非彼所聞一切境界終不可取此示三摩鉢提假觀方便也三摩鉢提義當幻觀言憶想十方如來一切菩薩種種修行勤苦三昧者謂思惟諸佛菩薩因中修種種難行苦行度諸衆生於三昧中起如幻觀以己身心自歷其境內驗其心種種境界備歷如幻以此幻觀發度生願久熏成種久久純熟便能內發大悲輕安而起菩薩利生妙行所謂以如幻觀而開幻衆作如幻佛事也此則三摩鉢提以如幻為首也非彼所聞終不可取善男子若諸衆生修於禪那先取數門心中了知生住滅念分劑頭數如是周遍四威儀中分別念數無不了知漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物非彼所聞一切境界終不可取此示寂觀方便初首也禪那義當中道一心名為寂觀言先取數門者正入禪最初工夫也以修禪人一向心多雜亂難得寂靜故先以數門為首謂初攝心先歸一息依息出入為度數之從一至十又從十至一如此往復息息不斷心心不昧生滅頭數一一分明自少至多以驗定力淺深若久久純熟數到一念不生則其息自斷寂然一心湛然安住是為定相如此周遍四威儀中念念了知久則百千世界唯心所現乃至一滴之雨分明了知如目覩物此寂靜觀之成功也如起信所説修止觀者不依氣息彼以內脫身心為要此依之者以初機攝心為方便非究竟依之也若以息為得則墮邪道非彼所聞也是名三觀初首方便此結名也前問三種淨觀以何為首故具答已於此結指是知前二十五輪但説觀相此三方便乃最初下手工夫即楞嚴二十五聖一一皆説最初下手工功夫即此義也若諸衆生遍修三觀勤行精進即名如來出現於世此示三觀之益也以此三觀乃一切如來本起因地故有圓根衆生能遍修三觀者即名如來出現於世言畢竟成就無礙也有此勝益故勸應修若後末世鈍根衆生心欲求道不得成就由昔業根當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心三種淨觀隨學一事此觀不得復修彼觀心不放捨漸次求證此言鈍根障重衆生當以懺悔斷障為要也由昔業障者乃夙習種子今修行時熏發現行作障道緣所謂好正而固邪欲潔而偏染者乃夙習使然也故當精勤懺悔消宿業障業障若消則道緣可辦也常起希望者謂希望願斷業障也故下即云先斷憎愛等乃貪嗔癡也勝上心慢也謂根本煩惱既斷現行不行則習氣可除觀行易成此觀不得乃復修彼觀者乃二十五輪標記之意故云漸次求證爾時世尊欲重宣此義而説偈言圓覺汝當知一切諸衆生欲求無上道先當結三期懺悔無始業經於三七日然後正思惟非彼所聞境畢竟不可取奢摩他至靜三摩正憶持禪那名數門是名三淨觀若能勤修習是名佛出世鈍根未成者常當勤心悔無始一切罪諸障若消滅佛境便現前上正宗分竟下流通分於是賢首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言進問威儀大悲世尊廣為我等及末世衆生開悟如來不思議事慶前所聞全經大義下正陳請意世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地此問經名并流通此法也此問有五一問經名二問奉持三問功德四問護持五問流布至何地位作是語已五體投地如是三請終而復始三展虔誠爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字汝今諦聽當為汝説許説誡聽時賢善首菩薩奉教歡喜及諸大衆默然而聽默佇善男子是經百千萬億恆河沙諸佛所説三世如來之所守護十方菩薩之所歸依十二部經清淨眼目此總歎法勝令生信重也此經乃諸佛如來本起因地法行故是諸佛所説如來守護教授菩薩故為菩薩之所歸依流出一切清淨真如菩提涅槃故為十二部經之眼目是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持此答名字示經名有五種也今結集經題但存其二舊解五名約教理行修多羅約教祕密王三昧約行餘皆約理中道一心故曰祕密非密語也依如來藏建立差別義盡於此當如是持善男子是經唯顯如來境界唯佛如來能盡宣説若菩薩及末世衆生依此修行漸次增進至於佛地此歎法勝意令修習答至何地也佛佛成道皆依圓覺為本因及成佛利生亦唯説此法教化菩薩此外更無別法故勸令修習可至佛地也善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切羣品譬如大海不讓小流乃至蚊蚋及阿修羅飲其水者皆得充滿此答何功德也獨被上根故教稱圓頓普攝三根故功德最大以是一切衆生清淨覺地皆證圓覺故無不充足故如大海不讓細流飲者大小皆足也善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義此較量顯勝也世寶盈剎但資有漏至理一言必轉凡成聖故功倍天淵善男子假使有人教百千恆沙衆生得阿羅漢果不如有人宣説此經分別半偈此以人較法更顯益也小果雖多終無實證此經半偈為成佛正因故難比也善男子若復有人聞此經名信心不惑當知是人非於一佛二佛種諸福慧如是乃至盡恆河沙一切佛所種諸善根聞此經教此歎勝機能受也謂能信受此法者蓋從多佛廣修福慧殊非小福薄德之人可堪也汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈此正囑流通以護修行者為第一也以修習此法者乃慧命所係若惡魔惱亂生退則慧命斷絶故當護持也爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病消滅財寶豐足常不乏少此敘金剛受囑發願守護持經人也金剛者以護法神執此寶杵故此得名以金剛寶能碎一切故言火首金剛謂頭有火𦦨即楞嚴所云化多淫心成智慧火者乃菩薩示現者也尼藍婆未詳所譯言此諸神皆夙習發願護法者也故常在佛會爾時大梵天王二十八天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安隱心不退轉此敘諸天受囑護持經者也大梵天王乃初禪王為娑婆世界主佛佛出世此王為請主二十八天總舉三界諸天謂六欲天十八禪天四空天也須彌山王特舉帝釋乃欲界主護國天王乃四王天為守護國界之主意列三界諸天皆為護法也爾時有力鬼王名吉槃茶與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我等亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵此敘鬼神受囑護持經者也吉槃茶亦名鳩槃茶此云可畏鬼食人精氣其疾如風變化無端住於林野管諸鬼衆故號為王不屬人天單居鬼趣此鬼既發願守護則一切惡鬼無能為害者矣一由旬四十里言守護方隅可四十里內無災害也問此經乃佛住大光明藏中入於三昧為地上一類大菩薩説二乘絶分故前法會不列又何有諸天鬼神發願守護耶答曰此非常情可測也然佛住大光明藏義當常寂光土則自他平等説聽皆無既曰於不二境現諸淨土則不特實報而同居必該若華藏實報必攝同居故華嚴法會諸天神王各各讚佛各得一種法門豈絶無耶是以約法則二乘絶分約境則凡聖該通況圓音落落十剎頓周豈此界諸天神王而不仰其嘉會耶況影響示現住佛境界無足疑也佛説此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所説皆大歡喜信受奉行此結會也舊解此天龍八部必內證法性示現此形者然會初不列義顯法勝結會該衆義必同聞故皆大歡喜信受奉行刻圓覺經解後跋法身流轉五道名曰衆生是則衆生清淨覺地即諸佛本起因地但以無明障蔽日用而不知故勞我世尊特特現身三界俯順群機指示各人本有佛性以衆生迷來久矣無明日厚障蔽日深非觀照無以通之故設三觀妙門為悟心之要良由根鈍不能圓修故散出一代時中初説空觀以破見愛煩惱次説假觀以破塵沙後説中觀以破無明又以先後歷別漸次不能圓證一心故説首楞嚴大定以統攝三觀圓照一心頓破無明是為圓頓法門然其文該三藏教攝五時十界聖凡迷悟因果纖悉備殫而學者智淺心粗以文廣義幽艱澀難通況離言得意妙契一心者乎若夫至簡而精至切而要者無尚圓覺之最勝法門也其文不過一萬三千餘言統攝無邊教海該羅法界圓宗徹一心之源歷三觀之旨偏正互換單復圓修搜窮妄宰批剝禪病而悟心妙門一超直入是所謂法界之真經成佛之妙行也頓悟頓證如觀掌果西來直指祕密妙義此外無餘蘊矣凡學佛者莫不以此為指南昔圭峰禪師著有略疏則似簡別有小鈔若太繁然文有所捍格則義有所不達義不達則理觀難明理觀不明則恍忽技岐而無決定之趣矣豫山居禪暇時一展卷深有慨焉於是祖疏義而直通經文貴了佛意而不事文言故作直解以結法緣草成適新安覺我居士程君夢暘聞而欣仰乃因居士吳啓高特請以梓之豫因歎曰佛説持四句偈勝施恆沙七寶之福以寶乃有漏之因法乃成佛之本較之天淵此吾佛金口稱讚也程君法施之福無量當與虗空等矣敬題於後令觀者知所自云時天啓二年歲次壬戌仲夏望日中興曹溪嗣法沙門憨山釋德清撰大方廣圓覺經直解後序原夫羲畫文繫聖人緣此標言什譯安研梵氏因而衍教非生智識莫問鑽求夏蟲不可語氷火齊方能照夜自漢徵宵夢華徙胡像八聲九部篇籍競埒於五車四辨三空授受不摹於一貫望門而入者每挂於眉尋岸而登者厥躓其步雖慈雲普蔭法雨頻傾而能借灑潤以濬心仰覆被而超神者抑亦鮮矣若乃圓覺真經尤是佛祖妙諦圓何所圓覺何所覺至矣哉孰得而思議焉維唐圭峯禪師了其旨歸精為疏注可謂獨豎幡幢直提今古然鏡華水月何常有定影定形美玉鈍金不妨於再雕再鑄屬有匡廬大師憨山者稟姿擢幹秀含耆闍崛之山滌慮澡情淨引阿耨達之水猛力精進於披鎧戒行瑩徹於懷珠一泛慧舟長遊覺海牙籤縑帙現於墳開壁壞者靡不賅融玉檢金函載夫地涌粒藏者悉從淹洽稔持圓覺透其包括西來務殫參窮闡是圓靈上品句詳節解理串脈聯拔新濯故之餘筆華逐寶華齊墜相印合符之際字葉等貝葉呈芬顯隱畢彰光明逈放龍宮遽失其深鷲嶽詎云其峻蓋真源實相久伴於跏趺故闢戶開牖卓立夫見解比常踞座揮麈吐論展義洋洋匹長河之潟流隱隱擬洪鐘之待叩茲者藉銀不律代鐵如意鴻濛之未分收象罔之所得遂令四八慈容更生歡喜二六大士共作威儀洵乎先悟後悟俱具法眼此説彼説總啓禪關且天孫鮫人不必同機而織摩尼纓絡允堪並篋而珍圭峰無二憨山惟一矣暘也根凡不穎器鈍欲鎔睇法橋企足知趨對經藏牆面難覩捧斯注集得未曾聞竊意憨師婆心最熱佛願克弘特付棗梨為廣流布又遡憨師劫來災難憑向磨礲業非設厄於推山自應消危於醉象因緣闡發盛護慈悲大衆奉傳宜加默體沾甘露以解惑霜傍慧炬而屣覺路則人不負師旨師可報佛恩矣凡若干卷勒成一部題曰圓覺直解其他所注儒書釋典已行於世未易縷數幸寶輪之常轉法併金鐸不難辨聲倘云此為文字之禪則世誰稱緘默之慧敬圖讚歎致妄敷揚明天啓壬戌中秋日新安內史程夢暘拜述
